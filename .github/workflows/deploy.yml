name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    working-directory: frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      # prebuild (sitemap) + vite build + postbuild (prerender) all run here.
      # VERCEL is not set in GH Actions so unless-vercel.mjs won't skip prerender.
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_BOOKS_API_URL: ${{ secrets.VITE_BOOKS_API_URL }}
          NODE_OPTIONS: --max-old-space-size=4096

      # Run packaging and deploy from the repo root so Vercel's "directory: frontend"
      # project setting resolves to root/frontend, not frontend/frontend.
      - name: Package for Vercel Build Output API
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p .vercel/output/static
          cp -r frontend/dist/. .vercel/output/static/
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              {
                "src": "/assets/(.*)",
                "headers": { "cache-control": "public, max-age=31536000, immutable" },
                "continue": true
              },
              {
                "src": "/(.*)",
                "headers": {
                  "X-Frame-Options": "SAMEORIGIN",
                  "X-Content-Type-Options": "nosniff",
                  "Referrer-Policy": "strict-origin-when-cross-origin",
                  "Permissions-Policy": "camera=(), microphone=(), geolocation=()",
                  "Strict-Transport-Security": "max-age=63072000; includeSubDomains; preload"
                },
                "continue": true
              },
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          EOF

      - name: Deploy to Vercel
        working-directory: ${{ github.workspace }}
        run: frontend/node_modules/.bin/vercel deploy --prebuilt --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
